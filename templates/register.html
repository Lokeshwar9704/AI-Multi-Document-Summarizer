{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Choose a password">
            </div>
            <button type="submit" class="summarize-btn" style="width: 100%;">Register</button>
        </form>
        <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
            Already have an account? <a href="/login" style="color: var(--primary-color);">Login here</a>
        </p>
    </div>
</div>


<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const response = await fetch('/register', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.success) {
            alert(data.success);
            window.location.href = '/login';
        } else {
            alert(data.error);
        }
    });
</script>
{% endblock %}
