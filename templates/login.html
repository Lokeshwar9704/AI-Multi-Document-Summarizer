{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="summarize-btn" style="width: 100%;">Login</button>
        </form>
        <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
            Don't have an account? <a href="/register" style="color: var(--primary-color);">Register here</a>
        </p>
    </div>
</div>


<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const response = await fetch('/login', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            alert(data.error);
        }
    });
</script>
{% endblock %}
